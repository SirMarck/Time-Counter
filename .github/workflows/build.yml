name: Auto Release APK

on:
  push:
    tags:
      - 'v*' # Roda apenas quando você criar uma tag como v1.1, v1.2, etc.

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Configurar Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Configurar Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '9.3.1'

    - name: Preparar Environment e Keystore
      run: |
        cp .env.example .env
        if [ -f debug.keystore.base64 ]; then
          base64 -d debug.keystore.base64 > debug.keystore
        else
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
        fi

    - name: Compilar o APK
      run: gradle assembleDebug --stacktrace

    - name: Renomear APK para TempoTrack
      run: mv app/build/outputs/apk/debug/app-debug.apk TempoTrack.apk

    - name: Criar Release e Fazer Upload do APK
      uses: softprops/action-gh-release@v2
      with:
        files: TempoTrack.apk
        name: Atualização ${{ github.ref_name }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
